name: Keep Supabase Alive

on:
  schedule:
    - cron: "*/5 * * * *" # mỗi 5 phút
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "https://grgwtfbeilzvxisjevbf.supabase.co/rest/v1/healthcheck?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
