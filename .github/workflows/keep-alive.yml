name: Keep Supabase Alive

on:
  schedule:
    - cron: "*/10 * * * *"  # mỗi 10 phút
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
               -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
               https://grgwtfbeilzvxjisjevbf.supabase.co/rest/v1/